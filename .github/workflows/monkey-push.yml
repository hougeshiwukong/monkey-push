name: 猴股神专业推送

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  professional-push:
    runs-on: ubuntu-latest
    steps:
    - name: 获取数据并生成专业报告
      run: |
        DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
        TIME=$(TZ=Asia/Shanghai date +%H:%M)
        
        # 获取股票数据（使用腾讯财经API）
        STOCK_DATA=$(curl -s "http://qt.gtimg.cn/q=sz002594,sh600519,sz300750" 2>/dev/null || echo "")
        
        # 解析数据函数
        parse_stock() {
          DATA=$1
          CODE=$2
          if echo "$DATA" | grep -q "$CODE"; then
            LINE=$(echo "$DATA" | grep "$CODE" | head -1)
            NAME=$(echo "$LINE" | cut -d'~' -f2)
            PRICE=$(echo "$LINE" | cut -d'~' -f3)
            CHANGE=$(echo "$LINE" | cut -d'~' -f5)
            CHANGE_PCT=$(echo "$LINE" | cut -d'~' -f6)
            echo "${NAME}|${PRICE}|${CHANGE}|${CHANGE_PCT}"
          else
            echo "获取失败|0|0|0"
          fi
        }
        
        # 获取三只股票数据
        BYD=$(parse_stock "$STOCK_DATA" "sz002594")
        MT=$(parse_stock "$STOCK_DATA" "sh600519")
        CATL=$(parse_stock "$STOCK_DATA" "sz300750")
        
        # 解析
        BYD_NAME=$(echo "$BYD" | cut -d'|' -f1)
        BYD_PRICE=$(echo "$BYD" | cut -d'|' -f2)
        BYD_CHANGE=$(echo "$BYD" | cut -d'|' -f3)
        BYD_PCT=$(echo "$BYD" | cut -d'|' -f4)
        
        MT_NAME=$(echo "$MT" | cut -d'|' -f1)
        MT_PRICE=$(echo "$MT" | cut -d'|' -f2)
        MT_CHANGE=$(echo "$MT" | cut -d'|' -f3)
        MT_PCT=$(echo "$MT" | cut -d'|' -f4)
        
        CATL_NAME=$(echo "$CATL" | cut -d'|' -f1)
        CATL_PRICE=$(echo "$CATL" | cut -d'|' -f2)
        CATL_CHANGE=$(echo "$CATL" | cut -d'|' -f3)
        CATL_PCT=$(echo "$CATL" | cut -d'|' -f4)
        
        # 生成分析建议
        generate_advice() {
          PCT=$1
          PCT_INT=${PCT%.*}
          if [ "$PCT_INT" -gt 3 ] 2>/dev/null; then
            echo "强势上涨，可考虑减仓锁定利润"
          elif [ "$PCT_INT" -gt 1 ] 2>/dev/null; then
            echo "温和上涨，持有观望"
          elif [ "$PCT_INT" -gt -1 ] 2>/dev/null; then
            echo "震荡整理，等待方向"
          elif [ "$PCT_INT" -gt -3 ] 2>/dev/null; then
            echo "回调中，谨慎观望"
          else
            echo "大幅下跌，关注抄底机会"
          fi
        }
        
        BYD_ADVICE=$(generate_advice "$BYD_PCT")
        MT_ADVICE=$(generate_advice "$MT_PCT")
        CATL_ADVICE=$(generate_advice "$CATL_PCT")
        
        # 使用简单文本格式避免引号问题
        echo "🐒 猴哥股票专业报告 📊" > /tmp/content.txt
        echo "⏰ ${DATE} ${TIME}" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "━━━━━━━━━━━━━━━━━━━━━" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "📈 实时行情" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "🚗 比亚迪 002594" >> /tmp/content.txt
        echo "💰 现价：¥${BYD_PRICE}" >> /tmp/content.txt
        echo "📊 涨跌：${BYD_CHANGE} (${BYD_PCT}%)" >> /tmp/content.txt
        echo "💡 建议：${BYD_ADVICE}" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "🍶 贵州茅台 600519" >> /tmp/content.txt
        echo "💰 现价：¥${MT_PRICE}" >> /tmp/content.txt
        echo "📊 涨跌：${MT_CHANGE} (${MT_PCT}%)" >> /tmp/content.txt
        echo "💡 建议：${MT_ADVICE}" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "🔋 宁德时代 300750" >> /tmp/content.txt
        echo "💰 现价：¥${CATL_PRICE}" >> /tmp/content.txt
        echo "📊 涨跌：${CATL_CHANGE} (${CATL_PCT}%)" >> /tmp/content.txt
        echo "💡 建议：${CATL_ADVICE}" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "━━━━━━━━━━━━━━━━━━━━━" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "🎯 今日策略" >> /tmp/content.txt
        echo "• 大盘情绪：根据实时数据动态判断" >> /tmp/content.txt
        echo "• 操作建议：参考个股建议，控制仓位" >> /tmp/content.txt
        echo "• 重点关注：突破信号和成交量变化" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "⚠️ 风险提示" >> /tmp/content.txt
        echo "以上分析基于公开数据，仅供参考，不构成投资建议。" >> /tmp/content.txt
        echo "" >> /tmp/content.txt
        echo "🐒 不为失败找借口，只为成功找方法！" >> /tmp/content.txt
        
        CONTENT=$(cat /tmp/content.txt)
        
        # 推送到飞书
        JSON_PAYLOAD=$(jq -n --arg text "$CONTENT" '{msg_type: "text", content: {text: $text}}')
        
        curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "$JSON_PAYLOAD" 2>/dev/null && echo "✅ 推送成功" || echo "❌ 推送失败"
