name: 猴股神自动推送

on:
  schedule:
    # 每30分钟检查一次
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  smart-push:
    runs-on: ubuntu-latest
    steps:
    - name: 获取实时股票数据并智能推送
      run: |
        # 获取当前北京时间
        HOUR=$(TZ=Asia/Shanghai date +%H)
        MINUTE=$(TZ=Asia/Shanghai date +%M)
        DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
        CURRENT_TIME="${HOUR}:${MINUTE}"
        
        echo "当前北京时间: $CURRENT_TIME"
        
        # 安装jq用于JSON解析
        sudo apt-get update && sudo apt-get install -y jq bc
        
        # 获取股票数据函数
        get_stock_data() {
          CODE=$1
          PREFIX=$2
          echo "正在获取股票 ${CODE} 数据..."
          
          RESPONSE=$(curl -s "https://push2.eastmoney.com/api/qt/stock/get?secid=${PREFIX}.${CODE}&fields=f43,f60,f170,f58" 2>&1)
          
          if [ -z "$RESPONSE" ]; then
            echo "错误: 无法获取股票 ${CODE} 数据"
            echo "未知|0|0|0"
            return
          fi
          
          # 检查是否有数据
          if echo "$RESPONSE" | grep -q '"data":null'; then
            echo "错误: 股票 ${CODE} 返回null"
            echo "未知|0|0|0"
            return
          fi
          
          # 使用jq解析JSON
          PRICE=$(echo "$RESPONSE" | jq -r '.data.f43 // 0')
          CHANGE_VAL=$(echo "$RESPONSE" | jq -r '.data.f170 // 0')
          PREV_CLOSE=$(echo "$RESPONSE" | jq -r '.data.f60 // 1')
          NAME=$(echo "$RESPONSE" | jq -r '.data.f58 // "未知"')
          
          # 计算价格（除以100）
          PRICE=$(echo "scale=2; $PRICE / 100" | bc)
          
          # 计算涨跌幅百分比
          if [ "$PREV_CLOSE" -ne 0 ]; then
            CHANGE_PCT=$(echo "scale=2; ($CHANGE_VAL / $PREV_CLOSE) * 100" | bc)
          else
            CHANGE_PCT="0"
          fi
          
          echo "${NAME}|${PRICE}|${CHANGE_VAL}|${CHANGE_PCT}"
        }
        
        # 获取3只股票数据
        echo "获取股票数据..."
        BYD=$(get_stock_data "002594" "0")
        MT=$(get_stock_data "600519" "1")
        CATL=$(get_stock_data "300750" "0")
        
        echo "原始数据:"
        echo "比亚迪: $BYD"
        echo "茅台: $MT"
        echo "宁德时代: $CATL"
        
        # 解析数据
        BYD_NAME=$(echo "$BYD" | cut -d'|' -f1)
        BYD_PRICE=$(echo "$BYD" | cut -d'|' -f2)
        BYD_CHANGE=$(echo "$BYD" | cut -d'|' -f4)
        
        MT_NAME=$(echo "$MT" | cut -d'|' -f1)
        MT_PRICE=$(echo "$MT" | cut -d'|' -f2)
        MT_CHANGE=$(echo "$MT" | cut -d'|' -f4)
        
        CATL_NAME=$(echo "$CATL" | cut -d'|' -f1)
        CATL_PRICE=$(echo "$CATL" | cut -d'|' -f2)
        CATL_CHANGE=$(echo "$CATL" | cut -d'|' -f4)
        
        echo "解析后数据:"
        echo "比亚迪: $BYD_NAME ¥$BYD_PRICE ($BYD_CHANGE%)"
        echo "茅台: $MT_NAME ¥$MT_PRICE ($MT_CHANGE%)"
        echo "宁德时代: $CATL_NAME ¥$CATL_PRICE ($CATL_CHANGE%)"
        
        # 智能推送逻辑
        SHOULD_PUSH=false
        
        # 如果是9:00-9:30，推送开盘推荐
        if [ "$HOUR" == "09" ] && [ "$MINUTE" -lt "30" ]; then
          echo "推送开盘前推荐..."
          SHOULD_PUSH=true
          
          # 分析推荐
          RECOMMENDATION="🎯 今日推荐\n"
          
          BYD_CHANGE_NUM=$(echo "$BYD_CHANGE" | bc)
          if (( $(echo "$BYD_CHANGE_NUM > 2" | bc -l) )); then
            RECOMMENDATION="${RECOMMENDATION}• 比亚迪：强势上涨 ${BYD_CHANGE}%，关注突破机会 🚀\n"
          elif (( $(echo "$BYD_CHANGE_NUM < -2" | bc -l) )); then
            RECOMMENDATION="${RECOMMENDATION}• 比亚迪：回调 ${BYD_CHANGE}%，等待企稳 👀\n"
          else
            RECOMMENDATION="${RECOMMENDATION}• 比亚迪：震荡整理，观望 📊\n"
          fi
          
          RECOMMENDATION="${RECOMMENDATION}• 茅台：长期持有，价值投资 💎\n"
          RECOMMENDATION="${RECOMMENDATION}• 宁德时代：等待明确的买入信号 ⏳\n"
          
          TITLE="🐒 猴哥开盘前推荐 - ${DATE}"
          CONTENT="${TITLE}

📊 大盘研判
• 市场情绪：根据隔夜美股和早盘走势判断
• 策略：积极布局，控制仓位

