name: 猴股神自动推送

on:
  schedule:
    # 工作日9:00（UTC 1:00）开盘前推荐
    - cron: '0 1 * * 1-5'
    # 工作日15:30（UTC 7:30）收盘后复盘
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  stock-push:
    runs-on: ubuntu-latest
    steps:
    - name: 获取股票数据并推送
      run: |
        # 安装依赖
        sudo apt-get update && sudo apt-get install -y jq bc
        
        # 获取当前时间
        DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
        TIME=$(TZ=Asia/Shanghai date +%H:%M)
        
        # 获取股票数据函数（东方财富API）
        get_stock_data() {
          CODE=$1
          PREFIX=$2
          
          # 调用东方财富API
          RESPONSE=$(curl -s "https://push2.eastmoney.com/api/qt/stock/get?secid=${PREFIX}.${CODE}&fields=f43,f57,f58,f60,f170" 2>/dev/null || echo "")
          
          if [ -n "$RESPONSE" ]; then
            # 解析JSON
            PRICE=$(echo "$RESPONSE" | jq -r '.data.f43 // 0')
            NAME=$(echo "$RESPONSE" | jq -r '.data.f58 // "未知"')
            PREV=$(echo "$RESPONSE" | jq -r '.data.f60 // 1')
            CHANGE=$(echo "$RESPONSE" | jq -r '.data.f170 // 0')
            
            # 计算实际价格和涨跌幅
            if [ "$PRICE" != "0" ] && [ "$PREV" != "0" ]; then
              PRICE_DEC=$(echo "scale=2; $PRICE / 100" | bc)
              CHANGE_DEC=$(echo "scale=2; $CHANGE / 100" | bc)
              PCT=$(echo "scale=2; ($CHANGE / $PREV) * 100" | bc)
              echo "${NAME}|${PRICE_DEC}|${CHANGE_DEC}|${PCT}"
            else
              echo "${NAME}|获取失败|0|0"
            fi
          else
            echo "API无响应|0|0|0"
          fi
        }
        
        echo "正在获取股票数据..."
        
        # 获取三只股票数据
        BYD=$(get_stock_data "002594" "0")
        MT=$(get_stock_data "600519" "1")
        CATL=$(get_stock_data "300750" "0")
        
        # 解析数据
        BYD_NAME=$(echo "$BYD" | cut -d'|' -f1)
        BYD_PRICE=$(echo "$BYD" | cut -d'|' -f2)
        BYD_CHANGE=$(echo "$BYD" | cut -d'|' -f3)
        BYD_PCT=$(echo "$BYD" | cut -d'|' -f4)
        
        MT_NAME=$(echo "$MT" | cut -d'|' -f1)
        MT_PRICE=$(echo "$MT" | cut -d'|' -f2)
        MT_CHANGE=$(echo "$MT" | cut -d'|' -f3)
        MT_PCT=$(echo "$MT" | cut -d'|' -f4)
        
        CATL_NAME=$(echo "$CATL" | cut -d'|' -f1)
        CATL_PRICE=$(echo "$CATL" | cut -d'|' -f2)
        CATL_CHANGE=$(echo "$CATL" | cut -d'|' -f3)
        CATL_PCT=$(echo "$CATL" | cut -d'|' -f4)
        
        echo "数据获取完成："
        echo "比亚迪: $BYD_NAME ¥$BYD_PRICE ($BYD_PCT%)"
        echo "茅台: $MT_NAME ¥$MT_PRICE ($MT_PCT%)"
        echo "宁德时代: $CATL_NAME ¥$CATL_PRICE ($CATL_PCT%)"
        
        # 生成建议
        generate_advice() {
          PCT=$1
          PCT_INT=$(echo "$PCT" | cut -d'.' -f1)
          PCT_INT=${PCT_INT:-0}
          
          if [ "$PCT_INT" -gt 5 ] 2>/dev/null; then
            echo "🔴 止盈：涨幅超5%，考虑减仓"
          elif [ "$PCT_INT" -gt 2 ] 2>/dev/null; then
            echo "🟡 持有：温和上涨"
          elif [ "$PCT_INT" -gt -2 ] 2>/dev/null; then
            echo "⚪ 观望：震荡整理"
          elif [ "$PCT_INT" -gt -5 ] 2>/dev/null; then
            echo "🟠 止损：回调中，设好止损位"
          else
            echo "🔵 抄底：跌幅超5%，关注反弹"
          fi
        }
        
        BYD_ADVICE=$(generate_advice "$BYD_PCT")
        MT_ADVICE=$(generate_advice "$MT_PCT")
        CATL_ADVICE=$(generate_advice "$CATL_PCT")
        
        # 判断是开盘还是收盘
        HOUR=$(TZ=Asia/Shanghai date +%H)
        if [ "$HOUR" == "09" ] || [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          TITLE="🐒 猴哥开盘前推荐 - ${DATE}"
          HEADER="📊 大盘研判\n• 市场情绪：根据隔夜美股判断\n• 策略：积极布局，控制仓位"
        else
          TITLE="🐒 猴哥收盘复盘 - ${DATE}"
          HEADER="📊 今日战况\n• 查看各股表现\n• 分析涨跌原因"
        fi
        
        # 构建推送内容
        CONTENT="${TITLE}

${HEADER}

📈 实时行情

🚗 ${BYD_NAME} 002594
💰 现价：¥${BYD_PRICE}
📊 涨跌：${BYD_CHANGE} (${BYD_PCT}%)
💡 ${BYD_ADVICE}

🍶 ${MT_NAME} 600519
💰 现价：¥${MT_PRICE}
📊 涨跌：${MT_CHANGE} (${MT_PCT}%)
💡 ${MT_ADVICE}

🔋 ${CATL_NAME} 300750
💰 现价：¥${CATL_PRICE}
📊 涨跌：${CATL_CHANGE} (${CATL_PCT}%)
💡 ${CATL_ADVICE}

🎯 今日策略
• 止盈：涨幅超5%考虑减仓
• 止损：跌幅超5%关注风险
• 仓位：控制仓位，灵活应对

⚠️ 风险提示
以上分析仅供参考，不构成投资建议。

🐒 不为失败找借口，只为成功找方法！"
        
        echo "推送内容："
        echo "$CONTENT"
        
        # 推送到飞书
        echo "正在推送到飞书..."
        curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"msg_type\": \"text\",
            \"content\": {
              \"text\": \"${CONTENT}\"
            }
          }" && echo "✅ 推送成功" || echo "❌ 推送失败"
