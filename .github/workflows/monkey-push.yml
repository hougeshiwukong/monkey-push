name: 猴股神专业推送

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  professional-push:
    runs-on: ubuntu-latest
    steps:
    - name: 获取数据并生成专业报告
      run: |
        DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
        TIME=$(TZ=Asia/Shanghai date +%H:%M)
        
        # 尝试获取股票数据
        BYD_PRICE="获取中"
        BYD_CHANGE="0"
        BYD_PCT="0"
        
        MT_PRICE="获取中"
        MT_CHANGE="0"
        MT_PCT="0"
        
        CATL_PRICE="获取中"
        CATL_CHANGE="0"
        CATL_PCT="0"
        
        # 尝试从API获取
        RESPONSE=$(curl -s --max-time 5 "https://push2.eastmoney.com/api/qt/stock/get?secid=0.002594&fields=f43,f170,f60" 2>/dev/null || echo "")
        if [ -n "$RESPONSE" ]; then
          # 提取价格
          F43=$(echo "$RESPONSE" | grep -oP '"f43":\K[0-9]+' || echo "0")
          F170=$(echo "$RESPONSE" | grep -oP '"f170":\K-?[0-9]+' || echo "0")
          F60=$(echo "$RESPONSE" | grep -oP '"f60":\K[0-9]+' || echo "1")
          
          if [ "$F43" != "0" ] && [ "$F60" != "0" ]; then
            BYD_PRICE=$(awk "BEGIN {printf \"%.2f\", $F43/100}")
            BYD_CHANGE=$(awk "BEGIN {printf \"%.2f\", $F170/100}")
            BYD_PCT=$(awk "BEGIN {printf \"%.2f\", ($F170/$F60)*100}")
          fi
        fi
        
        # 茅台
        RESPONSE=$(curl -s --max-time 5 "https://push2.eastmoney.com/api/qt/stock/get?secid=1.600519&fields=f43,f170,f60" 2>/dev/null || echo "")
        if [ -n "$RESPONSE" ]; then
          F43=$(echo "$RESPONSE" | grep -oP '"f43":\K[0-9]+' || echo "0")
          F170=$(echo "$RESPONSE" | grep -oP '"f170":\K-?[0-9]+' || echo "0")
          F60=$(echo "$RESPONSE" | grep -oP '"f60":\K[0-9]+' || echo "1")
          
          if [ "$F43" != "0" ] && [ "$F60" != "0" ]; then
            MT_PRICE=$(awk "BEGIN {printf \"%.2f\", $F43/100}")
            MT_CHANGE=$(awk "BEGIN {printf \"%.2f\", $F170/100}")
            MT_PCT=$(awk "BEGIN {printf \"%.2f\", ($F170/$F60)*100}")
          fi
        fi
        
        # 宁德时代
        RESPONSE=$(curl -s --max-time 5 "https://push2.eastmoney.com/api/qt/stock/get?secid=0.300750&fields=f43,f170,f60" 2>/dev/null || echo "")
        if [ -n "$RESPONSE" ]; then
          F43=$(echo "$RESPONSE" | grep -oP '"f43":\K[0-9]+' || echo "0")
          F170=$(echo "$RESPONSE" | grep -oP '"f170":\K-?[0-9]+' || echo "0")
          F60=$(echo "$RESPONSE" | grep -oP '"f60":\K[0-9]+' || echo "1")
          
          if [ "$F43" != "0" ] && [ "$F60" != "0" ]; then
            CATL_PRICE=$(awk "BEGIN {printf \"%.2f\", $F43/100}")
            CATL_CHANGE=$(awk "BEGIN {printf \"%.2f\", $F170/100}")
            CATL_PCT=$(awk "BEGIN {printf \"%.2f\", ($F170/$F60)*100}")
          fi
        fi
        
        # 生成建议
        generate_advice() {
          PCT=$1
          PCT_NUM=$(echo "$PCT" | cut -d'.' -f1)
          PCT_NUM=${PCT_NUM:-0}
          
          if [ "$PCT_NUM" -gt 5 ] 2>/dev/null; then
            echo "止盈建议：涨幅超5%，考虑减仓"
          elif [ "$PCT_NUM" -gt 2 ] 2>/dev/null; then
            echo "持有观望：温和上涨"
          elif [ "$PCT_NUM" -gt -2 ] 2>/dev/null; then
            echo "震荡整理：等待方向"
          elif [ "$PCT_NUM" -gt -5 ] 2>/dev/null; then
            echo "止损关注：回调中，设好止损"
          else
            echo "抄底机会：跌幅超5%，关注反弹"
          fi
        }
        
        BYD_ADVICE=$(generate_advice "$BYD_PCT")
        MT_ADVICE=$(generate_advice "$MT_PCT")
        CATL_ADVICE=$(generate_advice "$CATL_PCT")
        
        # 构建内容
        {
          echo "🐒 猴哥股票专业报告 📊"
          echo "⏰ ${DATE} ${TIME}"
          echo ""
          echo "📈 实时行情"
          echo ""
          echo "🚗 比亚迪 002594"
          echo "💰 现价：¥${BYD_PRICE}"
          echo "📊 涨跌：${BYD_CHANGE} (${BYD_PCT}%)"
          echo "💡 ${BYD_ADVICE}"
          echo ""
          echo "🍶 贵州茅台 600519"
          echo "💰 现价：¥${MT_PRICE}"
          echo "📊 涨跌：${MT_CHANGE} (${MT_PCT}%)"
          echo "💡 ${MT_ADVICE}"
          echo ""
          echo "🔋 宁德时代 300750"
          echo "💰 现价：¥${CATL_PRICE}"
          echo "📊 涨跌：${CATL_CHANGE} (${CATL_PCT}%)"
          echo "💡 ${CATL_ADVICE}"
          echo ""
          echo "🎯 今日策略"
          echo "• 止盈：涨幅超5%考虑减仓"
          echo "• 止损：跌幅超5%关注风险"
          echo "• 仓位：控制仓位，灵活应对"
          echo ""
          echo "⚠️ 风险提示"
          echo "以上分析仅供参考，不构成投资建议。"
          echo ""
          echo "🐒 不为失败找借口，只为成功找方法！"
        } > /tmp/content.txt
        
        CONTENT=$(cat /tmp/content.txt)
        
        # 推送到飞书
        jq -n --arg text "$CONTENT" '{msg_type: "text", content: {text: $text}}' > /tmp/payload.json
        
        curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d @/tmp/payload.json && echo "✅ 推送成功" || echo "❌ 推送失败"
