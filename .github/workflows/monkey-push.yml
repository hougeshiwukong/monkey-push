        fi
        
        # 如果是手动触发，立即推送
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "手动触发，立即推送..."
          SHOULD_PUSH=true
          
          TITLE="🐒 猴哥即时推送 - ${DATE} ${CURRENT_TIME}"
          CONTENT="${TITLE}

📊 实时数据
• 比亚迪：¥${BYD_PRICE} (${BYD_CHANGE}%)
• 茅台：¥${MT_PRICE} (${MT_CHANGE}%)
• 宁德时代：¥${CATL_PRICE} (${CATL_CHANGE}%)

