name: 猴股神自动推送

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  push-morning:
    if: github.event.schedule == '0 1 * * 1-5' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - name: 开盘前推荐
      run: |
        DATE=$(date +%Y-%m-%d)
        curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"🐒 猴哥开盘前推荐 - ${DATE}\n\n📊 大盘研判\n• 市场情绪：偏乐观\n• 策略：积极布局\n\n🎯 今日关注\n• 比亚迪：关注突破\n• 茅台：长期持有\n• 宁德时代：等待企稳\n\n⚠️ 风险提示\n• 以上仅供参考，不构成投资建议\n\n🐒 不为失败找借口，只为成功找方法！\"}}"

  push-evening:
    if: github.event.schedule == '30 7 * * 1-5'
    runs-on: ubuntu-latest
    steps:
    - name: 收盘后复盘
      run: |
        DATE=$(date +%Y-%m-%d)
        curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"🐒 猴哥收盘复盘 - ${DATE}\n\n📊 今日战况\n• 查看各股表现\n\n💡 复盘总结\n• 分析今日涨跌原因\n\n🎯 明日策略\n• 关注美股走势\n• 控制仓位\n\n🐒 不为失败找借口，只为成功找方法！\"}}"
