        fi
        
        # 执行推送到飞书
        if [ "$SHOULD_PUSH" == "true" ]; then
          echo "推送到飞书..."
          echo "推送内容预览:"
          echo "$CONTENT"
          
          curl -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"text\",
              \"content\": {
                \"text\": \"${CONTENT}\"
              }
            }" 2>/dev/null && echo "✅ 飞书推送成功" || echo "❌ 飞书推送失败"
        else
          echo "⏰ 不在推送时间段，跳过"
        fi
