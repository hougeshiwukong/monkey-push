        fi
        
        # 如果是15:30-16:00，推送收盘复盘
        if [ "$HOUR" == "15" ] && [ "$MINUTE" -ge "30" ]; then
          echo "推送收盘后复盘..."
          SHOULD_PUSH=true
          
          TITLE="🐒 猴哥收盘复盘 - ${DATE}"
          CONTENT="${TITLE}

📊 今日战况
